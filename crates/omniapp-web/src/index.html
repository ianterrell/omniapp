<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniApp</title>
  <link rel="stylesheet" href="/app.css">
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand-block">
        <div class="brand"><span class="mark" id="brandMark">O</span><span class="brand-name" id="brandName">Loading…</span></div>
        <div class="project-desc" id="projectDesc"></div>
      </div>
      <nav id="nav" aria-label="Primary"></nav>
    </aside>
    <main>
      <div class="subnav" id="subnav"></div>
      <header>
        <div class="head-text">
          <h1 id="title">Your workspace</h1>
          <p class="subtitle" id="subtitle">Reading project definitions…</p>
        </div>
        <div class="actions" id="actions"></div>
      </header>
      <div id="page"><div class="loading">Loading…</div></div>
    </main>
  </div>
</body>
</html>
