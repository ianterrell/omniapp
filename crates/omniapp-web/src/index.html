<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniApp</title>
  <style>
    :root { color-scheme: light; --ink:#18201d; --muted:#68736e; --line:#dce2de; --paper:#f6f7f4; --panel:#fff; --accent:#245c47; --accent-soft:#dcebe4; --danger:#a13c32; }
    * { box-sizing:border-box }
    body { margin:0; color:var(--ink); background:var(--paper); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif }
    button,input,textarea,select { font:inherit }
    button { cursor:pointer }
    .app { min-height:100vh; display:grid; grid-template-columns:250px minmax(0,1fr) }
    aside { padding:28px 20px; background:#17231e; color:#f4f7f5; display:flex; flex-direction:column; gap:26px }
    .brand { display:flex; align-items:center; gap:11px; font-size:18px; font-weight:700; letter-spacing:-.02em }
    .mark { width:30px; height:30px; display:grid; place-items:center; border:1px solid #80a995; border-radius:9px; color:#b7d9c8 }
    .project-name { color:#aab9b1; font-size:12px; margin-top:2px; overflow:hidden; text-overflow:ellipsis }
    .nav-label { color:#809087; text-transform:uppercase; letter-spacing:.12em; font-size:10px; font-weight:700; margin:0 9px 8px }
    nav button { width:100%; border:0; color:#cbd5d0; background:transparent; padding:9px; border-radius:7px; text-align:left; display:flex; justify-content:space-between }
    nav button:hover,nav button.active { color:#fff; background:#293a32 }
    nav small { color:#819088 }
    .aside-foot { margin-top:auto; color:#819088; font-size:12px }
    main { min-width:0; padding:30px clamp(22px,4vw,58px) 60px }
    header { min-height:64px; display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:25px }
    h1 { margin:0; font:600 clamp(25px,3vw,34px)/1.15 ui-serif,Georgia,serif; letter-spacing:-.025em }
    .subtitle { color:var(--muted); margin:7px 0 0 }
    .actions { display:flex; gap:9px }
    .btn { border:1px solid var(--line); border-radius:8px; padding:8px 13px; background:var(--panel); color:var(--ink); font-weight:600 }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent) }
    .btn.danger { color:var(--danger) }
    .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:14px }
    .search { width:min(360px,100%); padding:9px 12px; border:1px solid var(--line); border-radius:8px; background:#fff }
    .count { color:var(--muted); margin-left:auto }
    .table-shell { overflow:auto; background:var(--panel); border:1px solid var(--line); border-radius:11px; box-shadow:0 2px 12px #21372d0a }
    table { width:100%; border-collapse:collapse; white-space:nowrap }
    th { color:var(--muted); background:#fafbf9; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.08em; padding:11px 15px; border-bottom:1px solid var(--line) }
    td { padding:13px 15px; border-bottom:1px solid #edf0ee; max-width:360px; overflow:hidden; text-overflow:ellipsis }
    tr:last-child td { border-bottom:0 } tbody tr { cursor:pointer } tbody tr:hover { background:#f8faf8 }
    .empty,.error,.loading { padding:50px 24px; color:var(--muted); text-align:center }
    .error { color:var(--danger) }
    .pagination { display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-top:14px; color:var(--muted) }
    dialog { width:min(620px,calc(100vw - 28px)); max-height:calc(100vh - 40px); border:0; border-radius:13px; padding:0; box-shadow:0 22px 70px #0b17115c }
    dialog::backdrop { background:#0d1712a8; backdrop-filter:blur(2px) }
    .dialog-head { position:sticky; top:0; z-index:1; padding:20px 23px 15px; background:#fff; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center }
    .dialog-head h2 { margin:0; font:600 22px ui-serif,Georgia,serif }
    .close { border:0; background:transparent; color:var(--muted); font-size:23px; line-height:1 }
    form { padding:20px 23px 24px }
    .field { margin-bottom:17px } label { display:block; font-weight:650; margin-bottom:6px }
    label small { color:var(--muted); font-weight:400 }
    input:not([type=checkbox]),textarea,select { width:100%; border:1px solid #cfd7d2; border-radius:8px; padding:9px 10px; background:#fff }
    textarea { min-height:120px; resize:vertical }
    input:focus,textarea:focus,select:focus { outline:3px solid var(--accent-soft); border-color:var(--accent) }
    .dialog-actions { display:flex; justify-content:flex-end; gap:9px; padding-top:5px }
    .delete-wrap { margin-right:auto }
    .badge { display:inline-block; background:var(--accent-soft); color:var(--accent); border-radius:99px; padding:2px 8px; font-size:12px }
    .relations { margin:22px 0; padding:15px; border:1px solid var(--line); border-radius:9px; background:#fafbf9 }
    .relations h3 { margin:0 0 9px; font-size:13px }
    .relation { display:flex; gap:7px; color:var(--muted); margin:5px 0 }
    @media (max-width:760px) { .app { grid-template-columns:1fr } aside { padding:14px 16px; gap:12px } .brand { justify-content:space-between } nav { display:flex; overflow:auto } .nav-label,.aside-foot { display:none } nav button { width:auto; white-space:nowrap } main { padding:22px 14px 45px } header { min-height:0 } }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div><div class="brand"><span class="mark">O</span> OmniApp</div><div class="project-name" id="projectName">Loading project…</div></div>
      <div><div class="nav-label">Views</div><nav id="views"></nav></div>
      <div class="aside-foot">Filesystem-backed · local only</div>
    </aside>
    <main>
      <header><div><h1 id="title">Your workspace</h1><p class="subtitle" id="subtitle">Reading project definitions…</p></div><div class="actions"><button class="btn primary" id="newButton" hidden>New record</button></div></header>
      <div class="toolbar"><input class="search" id="filter" type="search" placeholder="Filter visible records…"><span class="count" id="count"></span></div>
      <div class="table-shell" id="content"><div class="loading">Loading records…</div></div>
      <div class="pagination" id="pagination"></div>
    </main>
  </div>
  <dialog id="editor"><div class="dialog-head"><h2 id="editorTitle">Edit record</h2><button class="close" aria-label="Close">×</button></div><form id="form"></form></dialog>
  <script>
    const state={project:null,view:null,page:1,result:null,editing:null};
    const $=s=>document.querySelector(s); const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    async function api(url,options){const r=await fetch(url,options);if(!r.ok){let x;try{x=await r.json()}catch{}throw new Error(x?.error||`${r.status} ${r.statusText}`)}return r.status===204?null:r.json()}
    async function boot(){try{state.project=await api('/api/project');$('#projectName').textContent=state.project.config.name;renderNav();const views=Object.values(state.project.views);if(views.length)await selectView(views[0].name);else{const model=Object.values(state.project.models)[0];if(model)await selectModel(model.name);else showError('No models or views are defined.')}}catch(e){showError(e.message)}}
    function renderNav(){const nav=$('#views');nav.innerHTML='';for(const view of Object.values(state.project.views)){const b=document.createElement('button');b.dataset.view=view.name;b.innerHTML=`<span>${esc(view.label||view.name)}</span><small>${esc(view.type)}</small>`;b.onclick=()=>selectView(view.name);nav.append(b)}if(!Object.keys(state.project.views).length){for(const model of Object.values(state.project.models)){const b=document.createElement('button');b.dataset.model=model.name;b.textContent=model.label||model.name;b.onclick=()=>selectModel(model.name);nav.append(b)}}}
    async function selectView(name){state.view=state.project.views[name];state.page=1;document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===name));await load()}
    async function selectModel(name){state.view={name,model:name,type:'table',fields:Object.keys(state.project.models[name].fields),query:{page_size:50}};state.page=1;document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.model===name));await load()}
    async function load(){const view=state.view, model=state.project.models[view.model];$('#title').textContent=view.label||view.name;$('#subtitle').textContent=model.description||`${model.label||model.name} · ${view.type} view`;$('#newButton').hidden=false;$('#content').innerHTML='<div class="loading">Loading records…</div>';try{const route=state.project.views[view.name]?`/api/views/${encodeURIComponent(view.name)}/records`:`/api/models/${encodeURIComponent(view.model)}/records`;state.result=await api(`${route}?page=${state.page}`);renderTable()}catch(e){showError(e.message)}}
    function visibleFields(){const model=state.project.models[state.view.model];return state.view.fields?.length?state.view.fields:Object.keys(model.fields)}
    function renderTable(){const fields=visibleFields(), rows=filteredRecords();$('#count').textContent=`${state.result.total} record${state.result.total===1?'':'s'}`;if(!rows.length){$('#content').innerHTML='<div class="empty">No matching records.</div>';$('#pagination').innerHTML='';return}let html='<table><thead><tr>'+fields.map(f=>`<th>${esc(state.project.models[state.view.model].fields[f]?.label||f)}</th>`).join('')+'</tr></thead><tbody>';for(const r of rows){html+=`<tr data-key="${esc(r.key)}">`+fields.map(f=>`<td>${format(r.values[f])}</td>`).join('')+'</tr>'}html+='</tbody></table>';$('#content').innerHTML=html;document.querySelectorAll('tbody tr').forEach((tr,i)=>tr.onclick=()=>openEditor(rows[i]));const {page,pages}=state.result;$('#pagination').innerHTML=`<button class="btn" ${page<=1?'disabled':''} id="prev">Previous</button><span>Page ${page} of ${Math.max(pages,1)}</span><button class="btn" ${page>=pages?'disabled':''} id="next">Next</button>`;$('#prev').onclick=()=>{state.page--;load()};$('#next').onclick=()=>{state.page++;load()}}
    function filteredRecords(){const q=$('#filter').value.trim().toLowerCase();return !q?state.result.records:state.result.records.filter(r=>JSON.stringify(r.values).toLowerCase().includes(q))}
    function format(v){if(v==null)return '<span style="color:#9aa39f">—</span>';if(typeof v==='boolean')return v?'Yes':'No';if(Array.isArray(v))return v.map(x=>`<span class="badge">${esc(x)}</span>`).join(' ');if(typeof v==='object')return esc(JSON.stringify(v));const s=String(v);return esc(s.length>100?s.slice(0,100)+'…':s)}
    function openEditor(record=null){
      state.editing=record;const model=state.project.models[state.view.model];
      $('#editorTitle').textContent=record?`Edit ${model.label||model.name}`:`New ${model.label||model.name}`;
      const form=$('#form');form.innerHTML='';
      for(const [name,field] of Object.entries(model.fields)){
        const wrap=document.createElement('div');wrap.className='field';
        let value=record?.values[name]??field.default??'';
        if(field.type==='date_time'&&value)value=new Date(value).toISOString().slice(0,16);
        const required=field.required?' required':'';let input;
        if(field.type==='boolean'){input=`<input id="f-${esc(name)}" name="${esc(name)}" type="checkbox" ${value?'checked':''}>`}
        else if(field.type==='enum'){input=`<select id="f-${esc(name)}" name="${esc(name)}"${required}><option value=""></option>${field.validation.choices.map(x=>`<option ${x===value?'selected':''}>${esc(x)}</option>`).join('')}</select>`}
        else if(field.type==='text'||field.type==='json'){input=`<textarea id="f-${esc(name)}" name="${esc(name)}"${required}>${esc(field.type==='json'&&value!==''?JSON.stringify(value,null,2):value)}</textarea>`}
        else{const type={integer:'number',number:'number',date:'date',date_time:'datetime-local'}[field.type]||'text';const readonly=field.source.kind==='asset'?' readonly':'';input=`<input id="f-${esc(name)}" name="${esc(name)}" type="${type}" value="${esc(value)}"${required}${readonly}>`}
        wrap.innerHTML=`<label for="f-${esc(name)}">${esc(field.label||name)}${field.required?' *':''} ${field.description?`<small>— ${esc(field.description)}</small>`:''}</label>${input}`;form.append(wrap)
      }
      if(record){const relations=document.createElement('div');relations.id='relations';relations.className='relations';relations.innerHTML='<h3>Relationships</h3><span class="subtitle">Resolving…</span>';form.append(relations);loadRelationships(record)}
      const actions=document.createElement('div');actions.className='dialog-actions';actions.innerHTML=`${record?'<span class="delete-wrap"><button type="button" class="btn danger" id="deleteButton">Delete</button></span>':''}<button type="button" class="btn" id="cancelButton">Cancel</button><button class="btn primary">Save</button>`;form.append(actions);
      $('#cancelButton').onclick=()=>$('#editor').close();if(record)$('#deleteButton').onclick=removeRecord;form.onsubmit=saveRecord;$('#editor').showModal()
    }
    async function loadRelationships(record){
      const target=$('#relations');if(!target)return;
      try{const data=await api(`/api/models/${encodeURIComponent(record.model)}/record/relationships?key=${encodeURIComponent(record.key)}`);const links=[...data.outbound.map(link=>`<div class="relation"><span class="badge">${esc(link.field)} →</span><span>${esc(link.record.model)} · ${esc(link.record.key)}</span></div>`),...data.inbound.map(link=>`<div class="relation"><span class="badge">← ${esc(link.field)}</span><span>${esc(link.record.model)} · ${esc(link.record.key)}</span></div>`)];target.innerHTML=`<h3>Relationships</h3>${links.join('')||'<span class="subtitle">No related records</span>'}`}
      catch(error){target.innerHTML=`<h3>Relationships</h3><span class="error">${esc(error.message)}</span>`}
    }
    async function saveRecord(e){
      e.preventDefault();const model=state.project.models[state.view.model],values={};
      try{
        for(const [name,field] of Object.entries(model.fields)){
          const el=document.getElementById(`f-${name}`);if(field.source.kind==='asset')continue;
          let value=field.type==='boolean'?el.checked:el.value;
          if(value===''){value=null}else if(field.type==='integer'){value=parseInt(value,10)}else if(field.type==='number'){value=parseFloat(value)}else if(field.type==='json'){value=JSON.parse(value)}else if(field.type==='date_time'){value=new Date(value).toISOString()}
          values[name]=value
        }
        const options={method:state.editing?'PUT':'POST',headers:{'content-type':'application/json'},body:JSON.stringify({revision:state.editing?.revision??null,values})};let url=`/api/models/${encodeURIComponent(state.view.model)}/records`;if(state.editing)url=`/api/models/${encodeURIComponent(state.view.model)}/record?key=${encodeURIComponent(state.editing.key)}`;
        await api(url,options);$('#editor').close();await load()
      }catch(err){alert(err.message)}
    }
    async function removeRecord(){if(!confirm('Delete this record from disk?'))return;try{await api(`/api/models/${encodeURIComponent(state.view.model)}/record?key=${encodeURIComponent(state.editing.key)}&revision=${encodeURIComponent(state.editing.revision)}`,{method:'DELETE'});$('#editor').close();await load()}catch(e){alert(e.message)}}
    function showError(message){$('#content').innerHTML=`<div class="error">${esc(message)}</div>`}
    $('#newButton').onclick=()=>openEditor();$('#filter').oninput=()=>state.result&&renderTable();$('.close').onclick=()=>$('#editor').close();boot();
  </script>
</body>
</html>
