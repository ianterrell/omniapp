name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl → fully static, runs on any Linux regardless of glibc
          # (Cloudflare's build image is older than GitHub's runners).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked -p omniapp-cli --target ${{ matrix.target }}
      - name: Package
        run: |
          tar -C "target/${{ matrix.target }}/release" -czf \
            "omniapp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" omniapp
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: omniapp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
